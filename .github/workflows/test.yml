name: Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "flake.lock"
      - "**.nix"

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
          - os: macos-latest
            system: aarch64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          nix-access-token: ${{ secrets.NIX_ACCESS_TOKEN }}

      - name: Run nix-unit
        run: nix build .#checks.${{ matrix.system }}.default
