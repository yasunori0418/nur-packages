name: Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "flake.lock"
      - "**.nix"

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: macos-26
            system: aarch64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Nix
        uses: ./.github/actions/setup-nix-quick
        with:
          nix-access-token: ${{ secrets.NIX_ACCESS_TOKEN }}

      - name: Run nix-unit
        run: nix build .#checks.${{ matrix.system }}.default
