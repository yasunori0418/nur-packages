name: Cachix Push

on:
  push:
    branches:
      - main
    paths:
      - "flake.lock"
      - "**.nix"
  workflow_dispatch:

concurrency:
  group: cachix-push-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: macos-26
            system: aarch64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Nix
        uses: ./.github/actions/setup-nix-quick
        with:
          nix-access-token: ${{ secrets.NIX_ACCESS_TOKEN }}

      # この system でキャッシュ未登録のパッケージだけを matrix フラグメントに出力
      # （system はネイティブランナーの app に固定されるため os のみ渡す）
      - name: Compute matrix fragment (skip cached)
        run: nix run ".#ci-matrix" -- "${{ matrix.os }}" > "frag-${{ matrix.system }}.json"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-matrix-frag-${{ matrix.system }}
          path: frag-${{ matrix.system }}.json
          retention-days: 1

  collect:
    needs: plan
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.merge.outputs.matrix }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ci-matrix-frag-*
          merge-multiple: true
          path: frags

      # 各 system のフラグメント配列を 1 つの matrix(include) に集約
      - name: Merge fragments
        id: merge
        run: echo "matrix={\"include\":$(jq -c -s 'add' frags/*.json)}" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: collect
    # 全てキャッシュ済なら include が空配列になり matrix がエラーになるためガードする
    if: ${{ fromJSON(needs.collect.outputs.matrix).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.collect.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Nix
        uses: ./.github/actions/setup-nix-quick-cachix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          nix-access-token: ${{ secrets.NIX_ACCESS_TOKEN }}

      - name: Build ${{ matrix.package }}
        run: |
          nix build ".#packages.${{ matrix.system }}.${{ matrix.package }}"
