name: Cachix Push

on:
  push:
    paths:
      - "flake.lock"
      - "**.nix"
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.list.outputs.packages }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          nix-access-token: ${{ secrets.NIX_ACCESS_TOKEN }}

      - name: Generate package list
        id: list
        run: |
          echo "packages=$(nix eval --json .#packages.x86_64-linux --apply 'builtins.attrNames')" >> $GITHUB_OUTPUT

  build-and-push:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.setup.outputs.packages) }}
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
          - os: macos-latest
            system: aarch64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          nix-access-token: ${{ secrets.NIX_ACCESS_TOKEN }}

      - name: Build ${{ matrix.package }}
        run: |
          AVAILABLE=$(nix eval --json .#packages.${{ matrix.system }} --apply 'builtins.attrNames' | jq --arg pkg "${{ matrix.package }}" 'contains([$pkg])')
          if [ "$AVAILABLE" = "true" ]; then
            nix build ".#packages.${{ matrix.system }}.${{ matrix.package }}"
          else
            echo "Skipping: ${{ matrix.package }} is not available for ${{ matrix.system }}"
          fi
