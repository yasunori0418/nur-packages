name: "Setup Nix (quick install) with Cachix"
description: "Install Nix quickly via nix-quick-install-action and configure Cachix"
inputs:
  cachix-auth-token:
    description: "Cachix authentication token"
    required: false
  nix-access-token:
    description: "GitHub PAT for Nix to fetch from GitHub (falls back to github.token)"
    required: false
runs:
  using: "composite"
  steps:
    - name: Install Nix
      uses: nixbuild/nix-quick-install-action@9f63be77f412a248c9d9a65a4c82cf066cdf8f0c # v35
      with:
        github_access_token: ${{ inputs.nix-access-token || github.token }}

    - name: Setup Cachix (yasunori)
      uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
      with:
        name: yasunori0418
        authToken: ${{ inputs.cachix-auth-token }}
